<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>"I used to be your neighbor♡" Bird Pit Solo Exhibition | June 26 - August 23, 2026</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="stage" aria-label="Interactive globe map">
      <canvas id="globe" aria-hidden="true"></canvas>
      <div class="pigeon-layer" id="pigeonLayer" aria-hidden="true"></div>
    </main>
    <nav class="map-actions" aria-label="Map actions">
      <button class="map-button" id="recallButton" type="button">RECALL</button>
      <button class="map-button" id="relocatedButton" type="button">VIEW RELOCATED</button>
    </nav>
    <section class="vault" id="vault" aria-label="Relocated pigeons" hidden>
      <div class="vault__box" id="vaultBox"></div>
    </section>
    <aside class="camera-control" aria-label="Camera controls">
      <label class="camera-control__label" for="cameraHeight">⬆️</label>
      <div class="camera-control__track">
        <input
          class="camera-control__slider"
          id="cameraHeight"
          type="range"
          min="-6"
          max="6"
          step="0.05"
          value="0.5"
        />
      </div>
      <output class="camera-control__value" id="cameraHeightValue" for="cameraHeight">⬇️</output>
    </aside>
    <script src="map-data.js"></script>
    <script src="pigeon-data.js"></script>
    <script src="inventory-data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
